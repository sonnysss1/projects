{% extends "base.html" %}
{% block title %}Add Habit{% endblock %}
{% block content %}
<div class="edit-container">
    <h2>Add a New Habit</h2>
    <form action="{{ url_for('main.add_habit') }}" method="post">
        <label for="name">Habit Name:</label>
        <input type="text" id="name" name="name" maxlength="50" required placeholder="e.g. Workout at the gym">
        <label for="description">Description:</label>
        <input type="text" id="description" name="description" maxlength="50" placeholder="A short description">
        <div class="edit-actions">
            <button type="submit" class="save-button">Add</button>
            <a href="{{ url_for('main.home') }}">
                <button type="button" class="cancel-button">Cancel</button>
            </a>
        </div>
    </form>
</div>
{% endblock %}
